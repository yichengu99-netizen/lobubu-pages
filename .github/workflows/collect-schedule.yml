name: 收集直播排期

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'schedule') || contains(github.event.issue.title, '【排期】')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 解析并写入排期数据
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime

          body = os.environ.get('ISSUE_BODY', '')
          try:
              data = json.loads(body)
          except:
              print("解析失败，跳过")
              exit(0)

          try:
              with open('data/schedules.json', 'r', encoding='utf-8') as f:
                  schedules = json.load(f)
          except:
              schedules = []

          data['collectedAt'] = datetime.utcnow().isoformat() + 'Z'
          data['submittedAt'] = data.get('submittedAt', datetime.utcnow().isoformat() + 'Z')
          schedules.append(data)

          with open('data/schedules.json', 'w', encoding='utf-8') as f:
              json.dump(schedules, f, ensure_ascii=False, indent=2)

          print(f"OK: 第 {len(schedules)} 条排期")
          PYEOF

      - name: 提交数据
        run: |
          git config user.name "lobubu-bot"
          git config user.email "bot@lobubu.pages"
          git add data/schedules.json
          git diff --staged --quiet || git commit -m "new schedule"
          git push

      - name: 关闭 Issue
        run: |
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
            -d '{"state":"closed","labels":["schedule-done"]}' \
            -H "Content-Type: application/json"
