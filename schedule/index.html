// 全局存当前商家的历史列表（用index引用，避免onclick里传复杂对象）
let _mySchedules = [];
let _pendingSchedule = null;
let _delIdx = -1;

function filterShops(val) {
  const dropdown = document.getElementById('shopDropdown');
  const kw = val.trim();
  document.getElementById('shopClearBtn').style.display = kw ? 'block' : 'none';
  if (!kw) document.getElementById('shopName').value = '';
  const matches = kw ? SHOPS.filter(s => s.includes(kw)) : SHOPS.slice(0, 20);
  if (!matches.length) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = matches.map((s, i) => {
    const highlighted = kw ? s.replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'), `<b style="color:#ff2442">${kw}</b>`) : s;
    return `<div data-shop="${i}" style="padding:13px 16px;font-size:15px;cursor:pointer;border-bottom:1px solid #f5f5f5">${highlighted}</div>`;
  }).join('');
  // 用事件委托，避免onclick属性传中文字符串
  dropdown.querySelectorAll('[data-shop]').forEach(el => {
    el.addEventListener('mousedown', () => {
      const idx = parseInt(el.getAttribute('data-shop'));
      selectShop(matches[idx]);
    });
  });
  dropdown.style.display = 'block';
}

  document.getElementById('shopSearch').value = name;

  document.getElementById('shopDropdown').style.display = 'none';

  document.getElementById('historyCard').style.display = 'none';

  document.getElementById('liveDate').min = new Date().toISOString().split('T')[0];
  var inp = document.getElementById('shopSearch');
  inp.addEventListener('input', function(){ filterShops(inp.value); });
  inp.addEventListener('focus', function(){ filterShops(inp.value); });
  inp.addEventListener('blur', hideDropdown);
  document.getElementById('startTime').addEventListener('input', updateEndTime);
  document.getElementById('startTime').addEventListener('change', updateEndTime);
};

function updateEndTime() {
  var val = document.getElementById('startTime').value;
  if (!val) return;
  var parts = val.split(':');
  var h = parseInt(parts[0]), m = parseInt(parts[1]);
  var endH = h + 4, endM = m;
  if (endH >= 24) { endH = 23; endM = 58; }
  var endStr = (endH < 10 ? '0' : '') + endH + ':' + (endM < 10 ? '0' : '') + endM;
  document.getElementById('endTime').value = endStr;
  document.getElementById('endTimeHint').textContent = '结束时间：' + endStr + '（开播后4小时）';
}

function _utf8ToBase64(str) {
  // 用 TextEncoder 转 Uint8Array，再分块 btoa，兼容大文件和低端机
  var bytes = new TextEncoder().encode(str);
  var binary = '';
  var chunkSize = 8192;
  for (var i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

async function _readFile() {
  var r = await fetch('https://api.github.com/repos/' + REPO + '/contents/data/schedules.json', {
    headers: { Authorization: 'token ' + _t, Accept: 'application/vnd.github.v3+json' }
  });
  if (!r.ok) throw new Error('读取失败 ' + r.status);
  var fileInfo = await r.json();
  // 用 TextDecoder 解码，兼容大文件和低端机
  var b64 = fileInfo.content.replace(/\n/g, '');
  var binary = atob(b64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  var data = JSON.parse(new TextDecoder('utf-8').decode(bytes));
  return { data, sha: fileInfo.sha };
}

async function _writeFile(data, sha, message) {
  var r = await fetch('https://api.github.com/repos/' + REPO + '/contents/data/schedules.json', {
    method: 'PUT',
    headers: { Authorization: 'token ' + _t, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: _utf8ToBase64(JSON.stringify(data, null, 2)), sha })
  });
  return r;
}

async function _writeSchedule(newItem, retries) {
  retries = retries || 3;
  for (var i = 0; i < retries; i++) {
    var f = await _readFile();
    var isDup = f.data.some(function(d){ return d.shopName === newItem.shopName && d.liveDate === newItem.liveDate && d.startTime === newItem.startTime; });
    if (isDup) throw new Error('DUPLICATE');
    f.data.push(newItem);
    var rPut = await _writeFile(f.data, f.sha, 'schedule: ' + newItem.shopName + ' ' + newItem.liveDate);
    if (rPut.status === 200 || rPut.status === 201) return true;
    if (rPut.status !== 409) throw new Error('写入失败 ' + rPut.status);
    await new Promise(function(r){ setTimeout(r, 600 + Math.random()*400); });
  }
  throw new Error('写入失败，请重试');
}

async function _deleteSchedule(idx) {
  var target = _mySchedules[idx];
  if (!target) throw new Error('记录不存在');
  for (var i = 0; i < 3; i++) {
    var f = await _readFile();
    var pos = f.data.findIndex(function(d){ return d.submittedAt === target.submittedAt; });
    if (pos === -1) return true;
    f.data.splice(pos, 1);
    var rPut = await _writeFile(f.data, f.sha, 'delete: ' + target.shopName + ' ' + target.liveDate);
    if (rPut.status === 200 || rPut.status === 201) return true;
    if (rPut.status !== 409) throw new Error('删除失败 ' + rPut.status);
    await new Promise(function(r){ setTimeout(r, 600 + Math.random()*400); });
  }
  throw new Error('删除失败，请重试');
}

  // 如果点的不是当前armed的，先重置

  }
  // 第二次点，真删
  resetArmed();
  doDelete(idx, btn);
}

function resetArmed() {
  if (_armedTimer) { clearTimeout(_armedTimer); _armedTimer = null; }
  if (_armedIdx >= 0) {
    var oldBtn = document.querySelector('.s-del-btn[data-idx="' + _armedIdx + '"]');
    if (oldBtn) { oldBtn.classList.remove('armed'); oldBtn.textContent = '🗑️'; oldBtn.disabled = false; }
  }
  _armedIdx = -1;
}

async function doDelete(idx, btn) {
  var target = _mySchedules[idx];
  if (!target) { showMsg('记录不存在，请刷新页面重试', 'error'); return; }
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  try {
    await _deleteSchedule(idx);
    var shop = document.getElementById('shopName').value;
    if (shop) await loadHistory(shop);
  } catch(e) {
    showMsg('删除失败：' + (e && e.message ? e.message : '未知错误'), 'error');
    if (btn) { btn.disabled = false; btn.textContent = '🗑️'; }
  }
}

function showMsg(msg, type) {
  var el = document.getElementById('_toast');
  if (!el) {
    el = document.createElement('div');
    el.id = '_toast';
    el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;max-width:80vw;text-align:center;transition:opacity .3s;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = type === 'error' ? '#ff2442' : '#1d1d1f';
  el.style.color = 'white';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.opacity = '0'; }, 2500);
}

function renderLevel(total) {
  var levelBar = document.getElementById('levelBar');
  var levelStatus = document.getElementById('levelStatus');
  var levelProgress = document.getElementById('levelProgress');
  var levelHint = document.getElementById('levelHint');
  levelBar.style.display = 'block';
  if (total === 0) {
    levelStatus.innerHTML = '<span style="color:#ccc">⚫ 流量扶持未开启</span>';
    levelProgress.style.width = '0%'; levelProgress.style.background = '#ddd';
    levelHint.textContent = '提报直播排期，解锁流量扶持资格';
  } else if (total < 5) {
    levelStatus.innerHTML = '<span style="color:#ff8800">🔒 再提报 ' + (5-total) + ' 场，解锁官方加热</span>';
    levelProgress.style.width = (total/5*100) + '%'; levelProgress.style.background = '#ffb300';
    levelHint.textContent = '不足5场视为无计划开播，不分配流量资源';
  } else if (total < 10) {
    levelStatus.innerHTML = '<span style="color:#52c41a">✅ 官方加热</span> <span style="color:#aaa;font-size:11px">再提报' + (10-total) + '场升级</span>';
    levelProgress.style.width = (total/10*100) + '%'; levelProgress.style.background = 'linear-gradient(90deg,#52c41a,#95de64)';
    levelHint.textContent = '已解锁流量扶持 · 提报10场解锁流量加成';
  } else if (total < 20) {
    levelStatus.innerHTML = '<span style="color:#1890ff">⚡ 流量加成</span> <span style="color:#aaa;font-size:11px">再提报' + (20-total) + '场升级</span>';
    levelProgress.style.width = (total/20*100) + '%'; levelProgress.style.background = 'linear-gradient(90deg,#1890ff,#69c0ff)';
    levelHint.textContent = '已解锁流量加成 · 提报20场解锁专属扶持资源';
  } else {
    levelStatus.innerHTML = '<span style="color:#ff2442">🔥 专属扶持资源</span>';
    levelProgress.style.width = '100%'; levelProgress.style.background = 'linear-gradient(90deg,#ff2442,#ff6b35)';
    levelHint.textContent = '已解锁最高等级扶持 · 运营将主动联系你';
  }
}

async function loadHistory(shop) {
  var card = document.getElementById('historyCard');
  var list = document.getElementById('historyList');
  card.style.display = 'block';
  list.innerHTML = '<div style="padding:20px;text-align:center;color:#ccc;font-size:14px">加载中...</div>';
  try {
    var f = await _readFile();
    var all = f.data;
    if (_pendingSchedule && _pendingSchedule.shopName === shop) {
      var isDup = all.some(function(d){ return d.submittedAt === _pendingSchedule.submittedAt; });
      if (!isDup) all = [_pendingSchedule].concat(all);
    }
    var mine = all.filter(function(d){ return d.shopName === shop; })
      .sort(function(a,b){ return (b.liveDate+b.startTime) > (a.liveDate+a.startTime) ? 1 : -1; });
    _mySchedules = mine; // 存到全局，用index引用

    var total = mine.length;
    var totalGmv = mine.reduce(function(s,d){ return s + (parseFloat(d.gmv)||0); }, 0);
    document.getElementById('historyBadge').textContent = total + ' 场';
    document.getElementById('historySubtitle').textContent = '已提报 ' + total + ' 场 · 计划成交 ' + totalGmv.toFixed(1) + ' 万';
    renderLevel(total);

    if (!total) {
      list.innerHTML = '<div class="history-empty"><div class="e">📭</div>还没有排期记录<br>填写上方表单提交第一场！</div>';
      return;
    }
    var showBadge = total >= 5;
    var html = '';
    for (var i = 0; i < mine.length; i++) {
      var item = mine[i];
      var badge = '';
      if (showBadge) {
        badge = item.gmv >= 15
          ? '<span class="s-badge">🔥 大场扶持</span>'
          : '<span class="s-badge" style="background:#fff8e6;color:#ff8800">⚡ 官方加热</span>';
      }
      var gmvStr = item.gmv ? '<div class="s-gmv">预估' + item.gmv + '万</div>' : '';
      html += '<div class="schedule-item">' +
        '<div class="s-dot"></div>' +
        '<div class="s-info">' +
          '<div class="s-date">' + item.liveDate + '</div>' +
          '<div class="s-time">' + item.startTime + (item.endTime ? ' → ' + item.endTime : '') + '</div>' +
          badge +
        '</div>' +
        gmvStr +
        '<button class="s-del-btn" data-idx="' + i + '" title="删除此排期">🗑️</button>' +
      '</div>';
    }
    list.innerHTML = html;
    list.querySelectorAll('.s-del-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        handleDelete(parseInt(btn.getAttribute('data-idx')));
      });
    });
  } catch(e) {
    list.innerHTML = '<div class="history-empty"><div class="e">⚠️</div>加载失败，请刷新重试</div>';
  }
}

async function submitForm() {
  var shopName = document.getElementById('shopName').value;
  var contact = document.getElementById('contact').value.trim();
  var liveDate = document.getElementById('liveDate').value;
  var startTime = document.getElementById('startTime').value;
  var endTime = document.getElementById('endTime').value;
  var gmvRaw = document.getElementById('gmv').value;
  var gmv = parseFloat(gmvRaw) || null;

  if (!shopName) { alert('请选择店铺名称'); return; }
  if (!contact) { alert('请填写联系方式'); return; }
  if (!/^1[0-9]{10}$/.test(contact)) { alert('请填写正确的11位手机号'); return; }
  if (!liveDate) { alert('请选择直播日期'); return; }
  if (!startTime) { alert('请填写开播时间'); return; }
  if (!gmv || gmv <= 0) { alert('请填写预估成交额'); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '提交中...';

  try {
    var newItem = { shopName, contact, liveDate, startTime, endTime, gmv, submittedAt: new Date().toISOString() };
    await _writeSchedule(newItem);
    _pendingSchedule = newItem;
    document.getElementById('overlay').classList.add('show');
  } catch(e) {
    if (e.message === 'DUPLICATE') {
      alert('该日期和开播时间已提报过，请勿重复提交！');
    } else {
      alert('网络繁忙，提交失败，请稍等几秒后重试。\n多次失败请联系运营同学。');
    }
  } finally {
    btn.disabled = false; btn.textContent = '提交排期 ✨';
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('startTime').value = '';
  document.getElementById('gmv').value = '';
  document.getElementById('endTime').value = '';
  document.getElementById('endTimeHint').textContent = '结束时间：填写开播时间后自动计算';
  var d = new Date(); d.setDate(d.getDate()+1);
  document.getElementById('liveDate').value = d.toISOString().split('T')[0];
  var shop = _pendingSchedule ? _pendingSchedule.shopName : document.getElementById('shopName').value;
  if (shop) loadHistory(shop);
}
</script>
</body>
</html>
